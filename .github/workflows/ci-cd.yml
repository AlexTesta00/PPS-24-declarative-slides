name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-26]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests without coverage
        if: matrix.os != 'ubuntu-24.04'
        run: sbt test

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-24.04'
        run: sbt clean coverage test coverageReport

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/scala-*/scoverage-report/scoverage.xml
          disable_search: true
          fail_ci_if_error: true
          version: v11.2.7 
          verbose: true

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-26]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Verify build
        run: sbt clean compile

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '25.9.0'
          check-latest: 'false'

      - name: Install Mermaid CLI dependencies
        run: |
          npm install -g @mermaid-js/mermaid-cli puppeteer
          npx puppeteer browsers install chrome-headless-shell

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libharfbuzz0b \
            libpangoft2-1.0-0 \
            libharfbuzz-subset0

      - name: Install dependency
        run: npm ci

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build assembly jar
        run: sbt clean assembly

      - name: Build MkDocs PDF for release
        shell: bash
        env:
          ENABLE_PDF_EXPORT: "1"
        run: |
          set +e
          mkdocs build --strict --site-dir ./site/docs 2>&1 | tee mkdocs-build.log
          status=${PIPESTATUS[0]}
          set -e
          
          if [ "$status" -ne 0 ]; then
            if [ -s ./site/docs/pdf/docs.pdf ] && grep -q "occurred while generating PDF" mkdocs-build.log; then
              echo "::warning::mkdocs-to-pdf ha generato il PDF, ma WeasyPrint ha prodotto warning/errori non bloccanti."
            else
              exit "$status"
            fi
          fi

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  pages-build:
    name: Build site + docs + API artifact
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '25.9.0'
          check-latest: 'false'

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libharfbuzz0b \
            libpangoft2-1.0-0 \
            libharfbuzz-subset0

      - name: Install Mermaid CLI dependencies
        run: |
          npm install -g @mermaid-js/mermaid-cli puppeteer
          npx puppeteer browsers install chrome-headless-shell

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build MkDocs documentation under /docs with PDF
        shell: bash
        env:
          ENABLE_PDF_EXPORT: "1"
        run: |
          set +e
          mkdocs build --strict --site-dir ./site/docs 2>&1 | tee mkdocs-build.log
          status=${PIPESTATUS[0]}
          set -e
          
          if [ "$status" -ne 0 ]; then
            if [ -s ./site/docs/pdf/docs.pdf ] && grep -q "occurred while generating PDF" mkdocs-build.log; then
              echo "::warning::mkdocs-to-pdf ha generato il PDF, ma WeasyPrint ha prodotto warning/errori non bloccanti."
            else
              exit "$status"
            fi
          fi

      - name: Build Scaladoc API documentation
        run: sbt doc

      - name: Copy Scaladoc under /api
        shell: bash
        run: |
          rm -rf ./api
          mkdir -p ./api
          cp -R target/scala-*/api/. ./api/

          mkdir -p ./site/api
          cp -R ./api/. ./site/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  pages-deploy:
    name: Deploy site to GitHub Pages
    runs-on: ubuntu-latest
    needs: pages-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5