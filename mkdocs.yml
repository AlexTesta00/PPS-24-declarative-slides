site_name: DeclSlides Documentation
site_url: https://github.com/AlexTesta00/PPS-24-declarative-slides/docs/
use_directory_urls: true
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.integrate
    - content.code.annotate
    - content.code.copy
    - content.code.expand
    - content.code.focus
    - content.code.inherit
    - content.tabs.link
    - content.tabs.sticky
    - content.tooltips
    - content.toc.sticky
    - content.toc.follow
    - content.toc.highlight
    - content.toc.deep
    - content.toc.indent
    - content.toc.collapse
    - content.toc.expand
    - content.toc.sections
    - content.toc.smooth_scroll
    - content.toc.scrollspy
    - content.toc.scrollspy_offset

nav:
  - Home:
    - Introduzione: index.md
    - Obiettivi: goals.md
  - Utilizzo:
      Quick Start: cli.md
  - Modello e DSL:
      - Dominio e validazione: domain.md
  - Architettura:
      - Architettura Generale: general_architecture.md
      - Design di dettaglio: detailed_design.md
      - Stack tecnologico: tech_stack.md
      - Decisioni progettuali: decision.md
  - Processo e qualità:
    - Processo di sviluppo: development_process.md
    - Sprint e retrospettiva: development_and_sprint.md
    - Problemi e soluzioni: problem_solution.md
    - Testing: testing.md
  - Conclusioni:
      - Valutazione finale e sviluppi futuri: conclusions.md
      - Limiti Noti: limitations.md

plugins:
  - search
  - to-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/docs.pdf
      cover_title: "PPS24-Declerative Slides"
      cover_subtitle: "Alex Testa"
      toc_title: "Indice"
      toc_level: 3

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format